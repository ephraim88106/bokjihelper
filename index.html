<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디나우 - 스마트 스터디카페</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs (CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        const firebaseConfig = {
            projectId: "test-06147957",
        };
        const app = initializeApp(firebaseConfig);
        console.log("Firebase app initialized");
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Study<span>Now</span></div>
            <div class="nav-controls">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="login-btn">로그인</button>
            </div>
        </nav>
    </header>

    <main id="app">
        <section class="hero-section">
            <h1>몰입의 즐거움, <br>함께하는 성장의 공간</h1>
            <p>실시간 좌석 현황을 확인하고 지금 바로 예약하세요.</p>
        </section>

        <section class="seat-map-section">
            <div class="section-header">
                <h2>실시간 좌석 현황</h2>
                <div class="legend">
                    <span class="legend-item"><span class="box available"></span> 이용 가능</span>
                    <span class="legend-item"><span class="box occupied"></span> 이용 중</span>
                    <span class="legend-item"><span class="box selected"></span> 선택됨</span>
                </div>
            </div>
            
            <div class="seat-grid" id="seatGrid">
                <!-- Seats will be generated by JS -->
            </div>

            <div class="booking-summary" id="bookingSummary">
                <p>선택된 좌석: <span id="selectedSeatNum">없음</span></p>
                <button class="reserve-btn" id="reserveBtn" disabled>좌석 예약하기</button>
            </div>
        </section>

        <section class="contact-section">
            <h2>제휴 및 이용 문의</h2>
            <form action="https://formspree.io/f/xgonjgae" method="POST" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="성함 입력" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="_replyto" placeholder="email@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 StudyNow StudyCafe. All rights reserved.</p>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
